name: Release Executa

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-14
            binary_path: executas/notes-summary/dist/notes-summary-darwin-arm64/bin/notes-summary
            archive_path: executas/notes-summary/dist/notes-summary-1.0.0-darwin-arm64.tar.gz
          - platform: darwin-x86_64
            os: macos-13
            binary_path: executas/notes-summary/dist/notes-summary-darwin-x86_64/bin/notes-summary
            archive_path: executas/notes-summary/dist/notes-summary-1.0.0-darwin-x86_64.tar.gz
          - platform: windows-x86_64
            os: windows-latest
            binary_path: executas/notes-summary/dist/notes-summary-windows-x86_64/bin/notes-summary.exe
            archive_path: executas/notes-summary/dist/notes-summary-1.0.0-windows-x86_64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: executas/notes-summary/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Executa archive
        shell: pwsh
        run: ./executas/notes-summary/scripts/build-local.ps1 -PlatformKey ${{ matrix.platform }}

      - name: Smoke test JSON-RPC describe and sampling route
        run: node scripts/test-executa-jsonrpc.mjs "${{ matrix.binary_path }}"

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: notes-summary-${{ matrix.platform }}
          path: ${{ matrix.archive_path }}
          if-no-files-found: error

  release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release candidates
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Manual build {0}', github.run_number) }}
          files: release-assets/*
          fail_on_unmatched_files: true
          make_latest: ${{ github.ref_type == 'tag' }}
